<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - Автобаттл</title>
    <style>
        body {
            background: #0d0a07;
            color: #e8dcc0;
            font-family: Tahoma;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .auth-box {
            background: #1a1612;
            border: 1px solid #c7ba00;
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0d0a07;
            border: 1px solid #c7ba00;
            color: #e8dcc0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #2a2420;
            border: 1px solid #c7ba00;
            color: #c7ba00;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #c7ba00;
            color: #0d0a07;
        }
        .error, .success {
            background: rgba(255,68,68,0.2);
            border: 1px solid #ff4444;
            padding: 10px;
            margin-top: 10px;
            display: none;
        }
        .success {
            background: rgba(68,255,68,0.2);
            border: 1px solid #44ff44;
            color: #88ff88;
        }
        .links {
            margin-top: 15px;
        }
        .links a {
            color: #c7ba00;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="auth-box">
    <h2>📝 РЕГИСТРАЦИЯ</h2>
    <input type="text" id="login" placeholder="Логин">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <input type="password" id="confirm" placeholder="Повторите пароль">
    <button id="registerBtn">Зарегистрироваться</button>
    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
    <div class="links">
        <a href="auth.html">Уже есть аккаунт? Войти</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js"></script>
<script>
    document.getElementById('registerBtn').onclick = async () => {
        const login = document.getElementById('login').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        
        if(!login || !email || !password || !confirm) {
            errorMsg.innerText = '❌ Заполните все поля';
            errorMsg.style.display = 'block';
            return;
        }
        
        if(password !== confirm) {
            errorMsg.innerText = '❌ Пароли не совпадают';
            errorMsg.style.display = 'block';
            return;
        }
        
        const result = await registerUser(login, password, email);
        if(result.success) {
            successMsg.innerText = result.message;
            successMsg.style.display = 'block';
            setTimeout(() => {
                window.location.href = 'auth.html';
            }, 2000);
        } else {
            errorMsg.innerText = result.message;
            errorMsg.style.display = 'block';
        }
    };
</script>
</body>
</html>
